# hpa.yaml — HorizontalPodAutoscaler (v1.1 STUB)
#
# Status: READY TO APPLY but intentionally NOT applied in v1.0 deploy.
# Enable once the cluster has metrics-server installed and traffic grows.
#
# Prerequisites:
#   kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
#   # Then verify: kubectl top pods -n vibeos-prod
#
# To activate:
#   kubectl apply -f bff/k8s/hpa.yaml

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vibeos-bff
  namespace: vibeos-prod
  labels:
    app: vibeos-bff
    app.kubernetes.io/name: vibeos-bff
    app.kubernetes.io/part-of: vibeos
  annotations:
    vibeos.app/release-gate: "v1.1"  # Do not apply until traffic baseline is established
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vibeos-bff
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # 5-min cooldown before scale-down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
