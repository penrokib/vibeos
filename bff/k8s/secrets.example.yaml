# secrets.example.yaml — EXAMPLE ONLY. DO NOT COMMIT REAL VALUES.
#
# This file documents the required secret keys for the vibeos-bff Secret.
# Never apply this file directly — use the kubectl imperative command below.
#
# ─────────────────────────────────────────────────────────────────────────
# FIRST-TIME SETUP (run from M3 with Scaleway k3s kubeconfig active):
# ─────────────────────────────────────────────────────────────────────────
#
#   kubectl create secret generic vibeos-bff-secrets \
#     --namespace vibeos-prod \
#     --from-literal=JWT_SECRET='<strong-random-64-char-string>' \
#     --from-literal=AUTH_TOKEN_TTL='7d' \
#     --from-literal=DATABASE_URL='postgresql://user:pass@host:5432/vibeos' \
#     --from-literal=INTERNAL_API_SECRET='<strong-random-secret>' \
#     --from-literal=CORS_ORIGIN='https://app.rokibrain.com,https://vibeos.app' \
#     --from-literal=BUG_STORAGE_ROOT='/app/storage/bugs' \
#     --from-literal=APNS_KEY_BASE64='<base64-encoded-content-of-.p8-file>' \
#     --from-literal=APNS_KEY_ID='<Apple-Key-ID-from-developer-portal>' \
#     --from-literal=APNS_TEAM_ID='<Apple-Team-ID>' \
#     --from-literal=APNS_BUNDLE_ID='com.vibeos.ios' \
#     --from-literal=APNS_PRODUCTION='false'
#
# ─────────────────────────────────────────────────────────────────────────
# KEY REFERENCE (all values required unless marked optional):
# ─────────────────────────────────────────────────────────────────────────
#
# JWT_SECRET          — HMAC-SHA256 signing key for JWT tokens. Min 32 chars.
# AUTH_TOKEN_TTL      — JWT expiry. e.g. "7d", "24h". Default: 7d
# DATABASE_URL        — Postgres connection string (Scaleway Managed DB or self-hosted).
# INTERNAL_API_SECRET — Shared secret for inter-service calls (mesh, fleet sync).
# CORS_ORIGIN         — Comma-separated allowed origins for browser CORS.
# BUG_STORAGE_ROOT    — (optional) Filesystem path for bug attachment storage.
#                        Defaults to ./storage/bugs. Use a PVC mount in prod.
#
# ── APNs push dispatcher (cycle 28) ──────────────────────────────────────
#
# These env vars are Roki blockers — the BFF starts and runs without them
# (graceful degrade: dispatch() returns APNS_NOT_CONFIGURED). Real values
# are set in this secret once Apple credentials are issued.
#
# APNS_KEY_BASE64     — Base64-encoded content of the .p8 Auth Key file.
#                        Generate with: base64 -i AuthKey_XXXXXXXXXX.p8
#                        Obtain the .p8 from: developer.apple.com → Certificates,
#                        Identifiers & Profiles → Keys → "+" → APNs.
#                        NOTE: env var is APNS_KEY_BASE64, NOT APNS_PRIVATE_KEY.
# APNS_KEY_ID         — 10-character Key ID shown next to the downloaded key.
# APNS_TEAM_ID        — 10-character Apple Developer Team ID (top-right of portal).
# APNS_BUNDLE_ID      — iOS app bundle identifier. Default: com.vibeos.ios
#                        Must match CFBundleIdentifier in the Xcode project.
# APNS_PRODUCTION     — "true" for App Store / production APNs endpoint;
#                        "false" for Sandbox / TestFlight. Default: false.
#                        Flip to "true" only when releasing to the App Store.
#
# ─────────────────────────────────────────────────────────────────────────
# ROTATING A SECRET:
# ─────────────────────────────────────────────────────────────────────────
#
#   kubectl create secret generic vibeos-bff-secrets \
#     --namespace vibeos-prod \
#     --from-literal=JWT_SECRET='<new-value>' \
#     ... \
#     --dry-run=client -o yaml | kubectl apply -f -
#
#   Then: kubectl rollout restart deployment/vibeos-bff -n vibeos-prod
#
# ─────────────────────────────────────────────────────────────────────────
# apiVersion: v1
# kind: Secret
# metadata:
#   name: vibeos-bff-secrets
#   namespace: vibeos-prod
# type: Opaque
# stringData:
#   JWT_SECRET: "<REDACTED>"
#   AUTH_TOKEN_TTL: "7d"
#   DATABASE_URL: "postgresql://<user>:<pass>@<host>:5432/vibeos"
#   INTERNAL_API_SECRET: "<REDACTED>"
#   CORS_ORIGIN: "https://app.rokibrain.com,https://vibeos.app"
#   BUG_STORAGE_ROOT: "/app/storage/bugs"
#   APNS_KEY_BASE64: "<REDACTED — base64 of .p8 file>"
#   APNS_KEY_ID: "<REDACTED>"
#   APNS_TEAM_ID: "<REDACTED>"
#   APNS_BUNDLE_ID: "com.vibeos.ios"
#   APNS_PRODUCTION: "false"
