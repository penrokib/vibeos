# =============================================================================
# vibeOS — Desktop Release Matrix
# =============================================================================
# Triggers on any `v*` tag push (e.g. `git tag v1.0.0 && git push origin v1.0.0`).
#
# Matrix:
#   - macos-14      → DMG (arm64 + x64 via universal build)
#   - ubuntu-22.04  → AppImage (x64 + arm64)
#   - windows-2022  → NSIS exe (x64)
#
# Signing:
#   macOS: Requires APPLE_ID, APPLE_TEAM_ID, APPLE_APP_SPECIFIC_PASSWORD,
#          CSC_LINK, CSC_KEY_PASSWORD as GitHub repo secrets.
#          If any are missing, builds an unsigned DMG and warns — does NOT fail.
#
#   Windows: Requires WIN_CSC_LINK, WIN_CSC_KEY_PASSWORD as GitHub repo secrets.
#            If missing, builds unsigned (SmartScreen will warn users until
#            reputation accumulates). Does NOT fail.
#
#   Linux: No signing in v1 — AppImage is shipped as-is.
#
# Output:
#   - Artifacts uploaded to the GitHub Release for the tag
#   - SHASUMS.txt computed and attached
#   - electron-updater feed files (latest-mac.yml / latest-linux.yml / latest.yml)
#     are produced by electron-builder and attached automatically
#
# Roki action items before first `v1.0.0` tag:
#   See docs/RELEASING.md for the full pre-flight checklist.
# =============================================================================

name: Release

on:
  push:
    tags:
      - 'v*'

# Prevent two release jobs for the same tag racing
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # do NOT cancel — let the first one finish

permissions:
  contents: write   # needed to create/update GitHub Release assets

jobs:
  # ── build + package matrix ─────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # one platform failing doesn't cancel others
      matrix:
        os: [macos-14, ubuntu-22.04, windows-2022]

    steps:
      # ── checkout ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── runtime ────────────────────────────────────────────────────────────
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Enable corepack
        run: corepack enable

      # ── install ────────────────────────────────────────────────────────────
      - name: Install dependencies
        run: yarn install --immutable

      # ── build shared packages ───────────────────────────────────────────────
      - name: Build @vibeos/database
        run: yarn workspace @vibeos/database build

      - name: Generate Prisma client
        run: yarn workspace @vibeos/database exec prisma generate

      - name: Build @vibeos/auth
        run: yarn workspace @vibeos/auth build

      # ── build desktop renderer + main ──────────────────────────────────────
      - name: Build desktop (electron-vite)
        run: yarn workspace @vibeos/desktop build

      # ── electron-builder cache ─────────────────────────────────────────────
      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: desktop/.cache/electron
          key: electron-${{ runner.os }}-${{ hashFiles('desktop/package.json') }}
          restore-keys: |
            electron-${{ runner.os }}-

      # ── macOS: notarisation env (optional — skips cleanly if missing) ───────
      - name: Set macOS signing env
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # Check which signing vars are available and warn about missing ones.
          missing=""
          for var in APPLE_ID APPLE_TEAM_ID APPLE_APP_SPECIFIC_PASSWORD CSC_LINK CSC_KEY_PASSWORD; do
            val="${!var:-}"
            if [[ -z "$val" ]]; then
              missing="${missing} ${var}"
            fi
          done
          if [[ -n "$missing" ]]; then
            echo "::warning::macOS signing secrets missing:${missing}. Producing UNSIGNED DMG — not suitable for end-user distribution until notarization is configured."
          else
            echo "All macOS signing secrets present — notarization will run."
          fi
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      # ── macOS: package DMG ─────────────────────────────────────────────────
      - name: Package (macOS — DMG)
        if: runner.os == 'macOS'
        run: yarn workspace @vibeos/desktop dist:mac
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Disable electron-builder's own notarize shorthand (handled by afterSign hook)
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Point electron download cache at our cached path
          ELECTRON_CACHE: desktop/.cache/electron

      # ── Linux: package AppImage ────────────────────────────────────────────
      - name: Package (Linux — AppImage)
        if: runner.os == 'Linux'
        run: yarn workspace @vibeos/desktop dist:linux
        env:
          ELECTRON_CACHE: desktop/.cache/electron

      # ── Windows: package NSIS installer ───────────────────────────────────
      - name: Set Windows signing env
        if: runner.os == 'Windows'
        shell: bash
        run: |
          missing=""
          for var in WIN_CSC_LINK WIN_CSC_KEY_PASSWORD; do
            val="${!var:-}"
            if [[ -z "$val" ]]; then
              missing="${missing} ${var}"
            fi
          done
          if [[ -n "$missing" ]]; then
            echo "::warning::Windows signing secrets missing:${missing}. Producing UNSIGNED exe — SmartScreen will warn users."
          fi
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Package (Windows — NSIS)
        if: runner.os == 'Windows'
        run: yarn workspace @vibeos/desktop dist:win
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          ELECTRON_CACHE: desktop/.cache/electron

      # ── collect artifacts ──────────────────────────────────────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.AppImage
            desktop/dist/*.exe
            desktop/dist/latest*.yml
          if-no-files-found: error
          retention-days: 7

  # ── publish release ─────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Download all platform artifacts into a staging directory
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: staging/

      # Flatten — upload-artifact preserves dir structure per matrix OS
      - name: Flatten artifact directories
        run: |
          mkdir -p release-assets
          find staging/ -type f \( \
            -name "*.dmg"       \
            -o -name "*.AppImage" \
            -o -name "*.exe"    \
            -o -name "latest*.yml" \
          \) -exec cp -v {} release-assets/ \;
          echo "--- Release assets ---"
          ls -lh release-assets/

      # Compute SHASUMS.txt
      - name: Compute SHASUMS.txt
        run: |
          cd release-assets
          sha256sum * | tee SHASUMS.txt
          echo ""
          echo "--- SHASUMS.txt ---"
          cat SHASUMS.txt

      # Publish to GitHub Releases — creates the release if it doesn't exist,
      # updates (overwrites) assets if the same tag is re-run (idempotent).
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: vibeOS ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}   # v1.0.0-beta → prerelease
          generate_release_notes: true
          files: |
            release-assets/*.dmg
            release-assets/*.AppImage
            release-assets/*.exe
            release-assets/latest*.yml
            release-assets/SHASUMS.txt
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: |
          echo "### vibeOS ${{ github.ref_name }} published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Assets attached to release:" >> $GITHUB_STEP_SUMMARY
          ls -lh release-assets/ | awk '{print "- " $NF " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Install URL: \`curl -fsSL https://raw.githubusercontent.com/penrokib/vibeos/main/install.sh | bash\`" >> $GITHUB_STEP_SUMMARY
